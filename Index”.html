<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast PRO - Global Sentinel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .shield-glow { box-shadow: 0 0 50px rgba(59, 130, 246, 0.2); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black">

    <header class="w-full max-w-md text-center py-10">
        <h1 class="text-5xl font-black text-blue-500 tracking-tighter italic drop-shadow-2xl">
            SKYCAST <span class="text-white text-3xl font-light">PRO</span>
        </h1>
        <p class="text-[10px] text-zinc-500 uppercase tracking-[0.4em] mt-2 font-bold">Global Sentinel Architecture</p>
    </header>

    <div class="w-full max-w-md bg-zinc-900/40 border border-zinc-800/50 rounded-[2.5rem] p-8 shield-glow backdrop-blur-3xl mb-8 relative">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full pulse shadow-[0_0_15px_rgba(34,197,94,0.6)]"></div>
                <span id="location-name" class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em]">Skanowanie...</span>
            </div>
            <span id="current-time" class="text-[10px] font-mono text-zinc-500 bg-zinc-800/50 px-3 py-1 rounded-full">--:--:--</span>
        </div>

        <div class="text-center py-6">
            <div id="temp" class="text-9xl font-black text-white tracking-tighter mb-4 drop-shadow-lg">--°</div>
            <div id="description" class="text-xs font-bold text-blue-400 uppercase tracking-[0.3em]">System Inicjalizacja...</div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-10 pt-8 border-t border-zinc-800/30">
            <div class="bg-zinc-800/20 p-4 rounded-2xl border border-zinc-800/50">
                <div class="text-[9px] text-zinc-500 uppercase mb-2 tracking-widest text-center">Wiatr</div>
                <div id="wind" class="text-xl font-black text-white text-center">-- km/h</div>
            </div>
            <div class="bg-zinc-800/20 p-4 rounded-2xl border border-zinc-800/50">
                <div class="text-[9px] text-zinc-500 uppercase mb-2 tracking-widest text-center">Kierunek</div>
                <div id="direction" class="text-xl font-black text-white text-center">--</div>
            </div>
        </div>
    </div>

    <button onclick="initSentinel()" class="w-full max-w-md bg-gradient-to-r from-blue-700 to-blue-500 hover:from-blue-600 hover:to-blue-400 text-white font-black py-5 rounded-3xl transition-all active:scale-95 shadow-xl shadow-blue-900/40 uppercase tracking-widest text-xs mb-10">
        AKTUALIZUJ POZYCJĘ 🛡️
    </button>

    <footer class="mt-auto pb-6 text-center">
        <p class="text-[9px] text-zinc-600 font-bold tracking-widest leading-relaxed">
            ARCHITEKT: PIOTREK • SILNIK: LUCKY SMART 2.0 PRO<br>
            <span class="text-zinc-800 uppercase">Status: Niezależna Chmura Globalna</span>
        </p>
    </footer>

    <script>
        async function initSentinel() {
            const locLabel = document.getElementById('location-name');
            const tempDisplay = document.getElementById('temp');
            const descDisplay = document.getElementById('description');

            if ("geolocation" in navigator) {
                locLabel.innerText = "PRZECHWYTYWANIE GPS...";
                
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        // Pobieranie danych z darmowego API Open-Meteo (Zero kredytów, zero opłat)
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                        const data = await res.json();
                        
                        // Aktualizacja danych w interfejsie
                        tempDisplay.innerText = Math.round(data.current_weather.temperature) + "°";
                        descDisplay.innerText = "Tarcza Aktywna • Niebo Czyste";
                        locLabel.innerText = `${lat.toFixed(2)}N , ${lon.toFixed(2)}E`;
                        document.getElementById('wind').innerText = data.current_weather.windspeed + " km/h";
                        document.getElementById('direction').innerText = data.current_weather.winddirection + "°";
                    } catch (err) {
                        locLabel.innerText = "BŁĄD KOMUNIKACJI";
                        descDisplay.innerText = "SERWER NIE ODPOWIADA";
                    }
                }, () => {
                    locLabel.innerText = "GPS ZABLOKOWANY";
                    descDisplay.innerText = "ZEZWÓL NA LOKALIZACJĘ";
                });
            } else {
                locLabel.innerText = "BRAK MODUŁU GPS";
            }
        }

        // Automatyczny start systemu
        initSentinel();
        
        // Zegar w czasie rzeczywistym
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
